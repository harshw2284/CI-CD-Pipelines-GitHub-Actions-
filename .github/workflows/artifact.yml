name: Artifact

on:
  workflow_dispatch:

jobs:
    create-artifact:
        runs-on: ubuntu-latest
        steps:
            - name: Creating an File
              run: | 
                touch file.txt
                echo "Jai Hind Dosto" > file.txt

            - name: upload Artifact
              uses: actions/upload-artifact@v7
              with:
                name: my-artifact
                path: file.txt

    download-artifact:
        needs: create-artifact
        runs-on: ubuntu-latest
        steps:
            - name: Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: my-artifact

            - name: Print Artifact
              run: cat file.txt

