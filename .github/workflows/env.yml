name: Environment Variables

on:
  workflow_dispatch:

env:
    APP_NAME: myapp

jobs:
    Environment:     
        runs-on: ubuntu-latest
        env:
          ENVIRONMENT: staging
        steps:
            - name: Print Variables         
              env:
                VERSION: 1.0.0
              
              run: |
               echo "APP_NAME: $APP_NAME"
               echo "ENVIRONMENT: $ENVIRONMENT"
               echo "VERSION: $VERSION"

               echo "COMMIT SHA: ${{ github.sha }}"
               echo "ACTOR: ${{ github.actor }}"


